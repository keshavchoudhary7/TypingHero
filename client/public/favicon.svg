<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b36" />
      <stop offset="50%" stop-color="#0d051f" />
      <stop offset="100%" stop-color="#05020a" />
    </linearGradient>
    
    <linearGradient id="heroNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <linearGradient id="heroPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <linearGradient id="goldCrown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield Ring -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="url(#heroPurple)" stroke-width="14" />
  <circle cx="256" cy="256" r="218" fill="none" stroke="#00f2fe" stroke-width="4" opacity="0.6" />

  <!-- Hero Armor / Shoulder Plates -->
  <path d="M 95 365 L 165 260 L 256 315 L 347 260 L 417 365 L 335 425 L 256 455 L 177 425 Z" fill="url(#heroPurple)"/>
  <path d="M 120 345 L 175 272 L 256 308 L 337 272 L 392 345 L 325 398 L 256 422 L 187 398 Z" fill="#0f0724"/>

  <!-- Cyber Hero Helmet Base -->
  <path d="M 155 205 Q 256 115 357 205 L 345 315 Q 256 375 167 315 Z" fill="#180e38" stroke="url(#heroNeon)" stroke-width="8"/>
  
  <!-- Cyber Visor / Glowing Eyes -->
  <path d="M 175 225 L 337 225 L 315 275 L 256 292 L 197 275 Z" fill="url(#heroNeon)" filter="url(#glow)"/>
  <path d="M 190 242 L 322 242" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- Hero Golden Crest / Lightning Crown -->
  <path d="M 215 155 L 256 65 L 297 155 L 268 155 L 256 125 L 244 155 Z" fill="url(#goldCrown)"/>
  <polygon points="256,45 276,105 256,92 236,105" fill="#fff" filter="url(#glow)"/>

  <!-- Left & Right Speed Lightning Bolts -->
  <path d="M 75 190 L 125 190 L 100 235 L 140 235 L 90 310 L 105 250 L 70 250 Z" fill="#00f2fe" filter="url(#glow)"/>
  <path d="M 437 190 L 387 190 L 412 235 L 372 235 L 422 310 L 407 250 L 442 250 Z" fill="#00f2fe" filter="url(#glow)"/>
</svg>